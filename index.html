<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .score, .level {
            font-size: 1.2em;
            color: #666;
        }

        .score span, .level span {
            font-weight: bold;
            color: #667eea;
            font-size: 1.5em;
        }

        canvas {
            border: 3px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .instructions {
            margin-top: 20px;
            text-align: left;
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            color: #666;
            line-height: 1.8;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            text-align: center;
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #e74c3c;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .game-over p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .game-over button {
            margin-top: 20px;
            background-color: #27ae60;
        }

        .game-over button:hover {
            background-color: #229954;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 贪吃蛇游戏</h1>
        <div class="info">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="level">等级: <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
            <button id="resetBtn">重新开始</button>
        </div>
        <div class="instructions">
            <h3>📋 游戏规则：</h3>
            <ul>
                <li>使用 <strong>方向键</strong> (↑ ↓ ← →) 或 <strong>WASD</strong> 控制蛇移动</li>
                <li>吃掉红色食物来增加分数和蛇的长度</li>
                <li>避免撞到墙壁或自己的身体</li>
                <li>每吃 5 个食物，游戏速度会加快</li>
                <li>分数越高，等级越高！</li>
            </ul>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOverModal">
        <h2>游戏结束！</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <p>最高等级: <span id="finalLevel">1</span></p>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // 蛇的初始状态
        let snake = [
            { x: 10, y: 10 }
        ];
        
        // 食物位置
        let food = { x: 15, y: 15 };
        
        // 游戏状态
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 100; // 毫秒
        let foodEaten = 0;
        
        // 按钮元素
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // 绘制蛇头函数 - 添加眼睛
        function drawSnakeHead(x, y, dirX, dirY) {
            const posX = x * gridSize + 1;
            const posY = y * gridSize + 1;
            const size = gridSize - 2;
            
            // 蛇头主体 - 渐变色
            const gradient = ctx.createLinearGradient(posX, posY, posX + size, posY + size);
            gradient.addColorStop(0, '#2ecc71');
            gradient.addColorStop(1, '#27ae60');
            ctx.fillStyle = gradient;
            ctx.fillRect(posX, posY, size, size);
            
            // 添加光泽效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(posX + 2, posY + 2, size / 3, size / 3);
            
            // 绘制眼睛
            const eyeSize = 3;
            const eyeDistance = 4;
            
            // 根据方向改变眼睛位置
            let eyeX1, eyeY1, eyeX2, eyeY2;
            
            if (dirX === 1) { // 向右
                eyeX1 = posX + size - eyeDistance;
                eyeY1 = posY + eyeDistance;
                eyeX2 = posX + size - eyeDistance;
                eyeY2 = posY + size - eyeDistance;
            } else if (dirX === -1) { // 向左
                eyeX1 = posX + eyeDistance;
                eyeY1 = posY + eyeDistance;
                eyeX2 = posX + eyeDistance;
                eyeY2 = posY + size - eyeDistance;
            } else if (dirY === -1) { // 向上
                eyeX1 = posX + eyeDistance;
                eyeY1 = posY + eyeDistance;
                eyeX2 = posX + size - eyeDistance;
                eyeY2 = posY + eyeDistance;
            } else if (dirY === 1) { // 向下
                eyeX1 = posX + eyeDistance;
                eyeY1 = posY + size - eyeDistance;
                eyeX2 = posX + size - eyeDistance;
                eyeY2 = posY + size - eyeDistance;
            }
            
            // 绘制眼睛
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            
            // 眼睛高光
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(eyeX1 - 1, eyeY1 - 1, 1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX2 - 1, eyeY2 - 1, 1, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 绘制蛇身函数
        function drawSnakeBody(x, y, index, totalLength) {
            const posX = x * gridSize + 1;
            const posY = y * gridSize + 1;
            const size = gridSize - 2;
            
            // 根据位置计算颜色 - 从头到尾逐渐变暗
            const colorIntensity = Math.max(0.4, 1 - (index / totalLength) * 0.6);
            const r = Math.floor(39 * colorIntensity);
            const g = Math.floor(174 * colorIntensity);
            const b = Math.floor(96 * colorIntensity);
            
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(posX, posY, size, size);
            
            // 蛇身纹理
            if (index % 2 === 0) {
                ctx.strokeStyle = `rgba(0, 0, 0, 0.1)`;
                ctx.lineWidth = 1;
                ctx.strokeRect(posX + 1, posY + 1, size - 2, size - 2);
            }
        }
        
        // 绘制函数
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            ctx.strokeStyle = '#2a2a4e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // 绘制蛇身（从后往前，这样蛇头会在最前面）
            for (let i = snake.length - 1; i > 0; i--) {
                drawSnakeBody(snake[i].x, snake[i].y, i, snake.length);
            }
            
            // 绘制蛇头
            drawSnakeHead(snake[0].x, snake[0].y, direction.x, direction.y);
            
            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 更新游戏状态
        function update() {
            // 更新方向
            direction = nextDirection;
            
            // 计算新的蛇头位置
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // 检测碰撞（墙壁）
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            // 检测碰撞（自身）
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }
            
            // 移动蛇
            snake.unshift(head);
            
            // 检测食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodEaten++;
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = Math.floor(score / 50) + 1;
                
                // 生成新食物
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                // 加速游戏
                if (foodEaten % 5 === 0) {
                    gameSpeed = Math.max(50, gameSpeed - 5);
                }
            } else {
                // 移除蛇尾
                snake.pop();
            }
        }
        
        // 游戏循环
        let gameInterval;
        function gameLoop() {
            if (gameRunning && !gamePaused) {
                update();
                draw();
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            const key = e.key.toLowerCase();
            
            // 方向键
            if (e.key === 'ArrowUp' || key === 'w') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (e.key === 'ArrowDown' || key === 's') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (e.key === 'ArrowLeft' || key === 'a') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (e.key === 'ArrowRight' || key === 'd') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            }
            
            e.preventDefault();
        });
        
        // 开始游戏
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            startBtn.textContent = '继续游戏';
            pauseBtn.disabled = false;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }
        
        // 暂停游戏
        function togglePause() {
            if (!gameRunning) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }
        
        // 重置游戏
        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            foodEaten = 0;
            gameSpeed = 100;
            food = { x: 15, y: 15 };
            
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            startBtn.textContent = '开始游戏';
            pauseBtn.textContent = '暂停';
            pauseBtn.disabled = true;
            
            clearInterval(gameInterval);
            draw();
        }
        
        // 游戏结束
        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            
            // 显示游戏结束对话框
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = Math.floor(score / 50) + 1;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('gameOverModal').classList.add('show');
        }
        
        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetGame);
        pauseBtn.disabled = true;
        
        // 初始化
        draw();
    </script>
</body>
</html>
